name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/dotnet-test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.actor == github.repository_owner)

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Get Version with MinVer
      id: get_version
      shell: bash
      run: |
        dotnet tool install --global minver-cli --version 6.0.0
        # Install directory in linux for dotnet global tools is usually ~/.dotnet/tools
        export PATH="$PATH:$HOME/.dotnet/tools"
        version=$(minver --tag-prefix v)
        echo "Calculated version: $version"
        echo "VERSION=$version" >> $GITHUB_ENV

    - name: Publish Application
      run: |
        dotnet publish "custom image downloader.csproj" -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish_output

    - name: Copy README
      shell: bash
      run: |
        cp README.md ./publish_output/ || true

    - name: Zip Files
      shell: bash
      run: |
        zipName="CustomImageDownloader-${{ env.VERSION }}-win-x64.zip"
        cd publish_output
        zip -r "../$zipName" ./*
        cd ..
        echo "ZIP_NAME=$zipName" >> $GITHUB_ENV

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event_name == 'push' && github.ref_name || env.VERSION }}
        name: Release ${{ github.event_name == 'push' && github.ref_name || env.VERSION }}
        generate_release_notes: true
        files: ${{ env.ZIP_NAME }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
